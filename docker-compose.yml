services:
  api:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./credentials.json:/app/credentials.json
      - ./token.json:/app/token.json
    ports:
      - "8000:8000"
  worker:
    build: .
    env_file: .env
    command: ["python", "-m", "src.main"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./credentials.json:/app/credentials.json
      - ./token.json:/app/token.json
